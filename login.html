<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5efe3">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.svg">
<title>POS - Prihlasenie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..800&display=swap" as="style">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" as="style">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..800&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap">
<link rel="stylesheet" href="/tokens.css">
<link rel="stylesheet" href="/a11y.css">
<link rel="stylesheet" href="/fonts/fonts.css">
<style>
  /* === DAYLIGHT THEME — login page === */
  /* Aplikuje Atelier Daylight tokeny rovnako ako css/pos.css. Login je
     samostatna stranka takze ma vlastny :root override. */
  :root {
    --color-bg-sunken:   #ece4d2;
    --color-bg:          #f5efe3;
    --color-bg-elevated: #ece4d2;
    --color-bg-surface:  rgba(30, 24, 18, .04);
    --color-bg-hover:    rgba(30, 24, 18, .08);
    --color-bg-active:   rgba(30, 24, 18, .12);
    --color-overlay:     rgba(30, 24, 18, .50);

    /* Borders — warm taupe (pencil-drawn feel, not pen-stroke) */
    --color-border:        rgba(122, 100, 80, .20);
    --color-border-hover:  rgba(122, 100, 80, .30);
    --color-border-strong: rgba(122, 100, 80, .42);

    --color-accent:           #b8542a;
    --color-accent-dim:       #a04920;
    --color-accent-bg:        rgba(184, 84, 42, .08);
    --color-accent-bg-hover:  rgba(184, 84, 42, .16);
    --color-accent-border:    rgba(184, 84, 42, .26);
    --color-accent-glow:      rgba(184, 84, 42, .22);

    --color-success:        #4a7a3a;
    --color-success-bg:     rgba(74, 122, 58, .10);
    --color-success-border: rgba(74, 122, 58, .28);

    --color-danger:        #b03830;
    --color-danger-bg:     rgba(176, 56, 48, .08);
    --color-danger-border: rgba(176, 56, 48, .26);

    --color-text:     #1e1812;
    --color-text-sec: #5a4f3c;
    --color-text-dim: #8a7d65;
    --color-focus:    #b8542a;

    /* Shadows — 3-tier paper drop stack (Phase 1 stronger floats) */
    --shadow-sm:    0 1px 2px rgba(30, 24, 18, .06),
                    0 2px 6px -1px rgba(30, 24, 18, .08);
    --shadow-md:    0 1px 3px rgba(30, 24, 18, .08),
                    0 4px 12px -2px rgba(30, 24, 18, .12),
                    0 8px 24px -4px rgba(30, 24, 18, .10);
    --shadow-lg:    0 4px 8px rgba(30, 24, 18, .10),
                    0 12px 32px -4px rgba(30, 24, 18, .18),
                    0 24px 64px -16px rgba(30, 24, 18, .20);
    --shadow-glow:  0 2px 12px rgba(184, 84, 42, .22);
    --shadow-inset: inset 0 1px 2px rgba(30, 24, 18, .06);

    --surface-app:    var(--color-bg);
    --surface-raised: var(--color-bg-elevated);
    --surface-sunken: var(--color-bg-sunken);
    --surface-card:   var(--color-bg-surface);
    --border-default: var(--color-border);
    --border-strong:  var(--color-border-strong);
    --text-primary:   var(--color-text);
    --text-secondary: var(--color-text-sec);
    --text-muted:     var(--color-text-dim);

    /* Phase 2 — display + body font: Outfit replaces Sora (POS only). */
    --font-display: 'Outfit', system-ui, sans-serif;
    --font-body:    'Outfit', system-ui, sans-serif;

    color-scheme: light;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  button, a, input { touch-action: manipulation; -webkit-touch-callout: none; }

  html, body {
    height: 100%;
    overflow: hidden;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    font-family: var(--font-body);
    /* Daylight foundation — dual radial (warm/cool axis) + cream linear */
    background:
      radial-gradient(ellipse 80% 60% at 30% 10%, rgba(184, 84, 42, .05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, color-mix(in srgb, var(--color-accent-secondary) 4%, transparent) 0%, transparent 50%),
      linear-gradient(180deg, #f5efe3 0%, #ece4d2 100%);
    color: var(--text-primary);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* Paper-grain texture overlay (Phase 1) — subtle multiply noise. */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' seed='3'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.05'/></svg>");
    mix-blend-mode: multiply;
    opacity: .35;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    position: relative;
    z-index: 1;
    padding: 20px;
  }

  /* Cream card with soft shadow — Daylight glass.
     Phase 3 — dual-tone gradient (light-from-above) + accent glow ring. */
  .card {
    position: relative;
    width: 100%;
    max-width: 400px;
    background: linear-gradient(180deg, var(--color-bg), var(--color-bg-elevated));
    border: 1px solid var(--color-border-strong);
    border-radius: 24px;
    padding: 32px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    box-shadow: 0 1px 3px rgba(30,24,18,.06),
                0 12px 32px -8px rgba(30,24,18,.12),
                0 24px 64px -16px rgba(30,24,18,.20),
                0 0 0 1px rgba(184,84,42,.22);
    backdrop-filter: blur(8px);
  }
  /* 1px highlight bar — paper edge catching light. Mirrors .u-modal::before. */
  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: 20%; right: 20%; height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255, 255, 255, .6) 50%,
      transparent 100%);
    pointer-events: none;
    border-radius: 1px;
  }

  /* Logo — Daylight terra/navy gradient */
  .logo {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--color-accent), var(--color-accent-secondary));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 800; font-size: 18px;
    color: #f5efe3;
    opacity: 0; animation: fadeInUp .5s ease forwards;
    box-shadow: 0 4px 12px rgba(184,84,42,.18);
  }

  .brand-name {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 700;
    opacity: 0; animation: fadeInUp .5s ease .08s forwards;
  }

  .brand-sub {
    font-size: 13px; color: var(--text-secondary);
    margin-top: -14px;
    opacity: 0; animation: fadeInUp .5s ease .14s forwards;
  }

  .pin-hint {
    width: 100%;
    max-width: 320px;
    font-size: 12px;
    line-height: 1.4;
    color: var(--text-secondary);
    text-align: center;
    opacity: 0;
    animation: fadeInUp .5s ease .17s forwards;
  }

  /* Employee pills */
  .pills {
    display: flex; flex-wrap: wrap;
    justify-content: center; gap: 8px;
    width: 100%;
    opacity: 0; animation: fadeInUp .5s ease .2s forwards;
  }

  .pill {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 14px 6px 6px;
    border-radius: 100px;
    background: var(--color-bg-surface);
    border: 1.5px solid var(--color-border);
    cursor: pointer;
    transition: all .2s ease;
    font-family: var(--font-body);
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
  }
  .pill:hover { background: rgba(30,24,18,.06); }
  .pill.selected {
    border-color: var(--color-accent);
    background: rgba(184,84,42,.10);
    color: var(--text-primary);
    box-shadow: 0 2px 12px rgba(184,84,42,.18);
  }

  .pill-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 11px; font-weight: 700;
    color: #f5efe3;
    flex-shrink: 0;
  }
  .pill-avatar.admin { background: var(--color-accent); }
  .pill-avatar.manazer { background: var(--color-accent-secondary); }
  .pill-avatar.cisnik { background: var(--color-success); }

  /* PIN dots */
  .dots {
    display: flex; gap: 16px;
    padding: 8px 0;
    opacity: 0; animation: fadeInUp .5s ease .28s forwards;
  }
  .dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--color-border-strong);
    background: transparent;
    transition: all .2s ease;
  }
  .dot.filled {
    background: var(--color-accent);
    border-color: var(--color-accent);
    box-shadow: 0 2px 8px rgba(184,84,42,.30);
  }
  .dot.error {
    background: var(--color-danger);
    border-color: var(--color-danger);
    box-shadow: 0 2px 8px rgba(176,56,48,.30);
  }
  .dot.success {
    background: var(--color-success);
    border-color: var(--color-success);
    box-shadow: 0 2px 8px rgba(74,122,58,.30);
  }
  .dots.shake { animation: shake .5s ease; }

  /* Numpad */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 280px;
    opacity: 0; animation: fadeInUp .5s ease .36s forwards;
  }

  .num-btn {
    height: 64px;
    border-radius: 14px;
    border: 1px solid var(--color-border);
    background: linear-gradient(180deg, var(--color-bg), var(--color-bg-elevated));
    color: var(--text-primary);
    font-family: var(--font-display);
    font-size: 24px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 2px rgba(30,24,18,.06),
                0 2px 6px -1px rgba(30,24,18,.08);
    transition: all .12s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .num-btn:hover { background: rgba(30,24,18,.06); }
  .num-btn:active, .num-btn.active-flash {
    transform: scale(0.93);
    background: rgba(30,24,18,.10);
  }
  .num-btn.fn {
    font-size: 20px;
    color: var(--text-secondary);
  }
  .num-btn:disabled {
    opacity: .25;
    pointer-events: none;
  }

  /* Status message */
  .status {
    min-height: 20px;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    transition: opacity .3s;
  }
  .status.error { color: var(--color-danger); }
  .status.success { color: var(--color-success); }
  .status.locked { color: var(--color-danger); }
  .status.pending { color: var(--text-secondary); }

  /* Clock */
  .clock-wrap {
    margin-top: 16px;
    text-align: center;
    opacity: 0; animation: fadeInUp .5s ease .44s forwards;
  }
  .clock {
    /* Phase 2 — digital-watch feel: JetBrains Mono Variable with ss01
       slashed zero + cv11 alternate digits. Tabular nums keep 14:32 stable
       as seconds tick. */
    font-family: var(--font-mono);
    font-size: 34px; font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
    font-feature-settings: 'ss01', 'cv11';
  }
  .clock-date {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* Keyframes */
  @keyframes fadeInUp {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }

  /* prevent virtual keyboard */
  input { position: absolute; opacity: 0; pointer-events: none; }

  @media (prefers-reduced-motion: reduce) {
    body::before { display: none; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="card">
    <div class="logo">POS</div>
    <div class="brand-name">Kaviaren &amp; Bar</div>
    <div class="brand-sub">Prihlaste sa pre pokracovanie</div>
    <p class="pin-hint">Ktorý účet sa otvorí, určí váš PIN — výber mena len zvýrazní profil, neprihlasuje.</p>

    <div class="pills" id="pills" role="radiogroup" aria-label="Vyber zamestnanca"></div>

    <div class="dots" id="dots" role="group" aria-label="PIN kod - 4 cifry">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="numpad" id="numpad" role="group" aria-label="Numericka klavesnica">
      <button class="num-btn" data-val="1">1</button>
      <button class="num-btn" data-val="2">2</button>
      <button class="num-btn" data-val="3">3</button>
      <button class="num-btn" data-val="4">4</button>
      <button class="num-btn" data-val="5">5</button>
      <button class="num-btn" data-val="6">6</button>
      <button class="num-btn" data-val="7">7</button>
      <button class="num-btn" data-val="8">8</button>
      <button class="num-btn" data-val="9">9</button>
      <button class="num-btn fn" data-val="clear" aria-label="Vymazat PIN">&times;</button>
      <button class="num-btn" data-val="0">0</button>
      <button class="num-btn fn" data-val="back" aria-label="Zmazat poslednu cifru">&larr;</button>
    </div>

    <div class="status" id="status" role="status" aria-live="assertive"></div>
  </div>

  <div class="clock-wrap">
    <div class="clock" id="clock"></div>
    <div class="clock-date" id="clockDate"></div>
  </div>
</div>

<script src="api.js"></script>
<script>
(function() {
  'use strict';

  let STAFF = [];

  const MAX_ATTEMPTS = 5;
  const LOCKOUT_SEC = 60;

  let pin = '';
  let selectedIndex = -1;
  let attempts = 0;
  let locked = false;
  let lockTimer = null;

  const pillsEl = document.getElementById('pills');
  const dotsEl = document.getElementById('dots');
  const dots = dotsEl.querySelectorAll('.dot');
  const numpad = document.getElementById('numpad');
  const statusEl = document.getElementById('status');
  const clockEl = document.getElementById('clock');
  const clockDateEl = document.getElementById('clockDate');

  function initialsFromName(fullName) {
    var parts = String(fullName || '').trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }

  function firstName(fullName) {
    var parts = String(fullName || '').trim().split(/\s+/).filter(Boolean);
    return parts[0] || fullName || '';
  }

  function renderPills() {
    pillsEl.innerHTML = '';
    if (!STAFF.length) {
      var empty = document.createElement('div');
      empty.className = 'brand-sub';
      empty.style.margin = '0';
      empty.textContent = 'Žiadny zamestnanci nie sú nastavení. Zadajte PIN.';
      pillsEl.appendChild(empty);
      return;
    }
    STAFF.forEach(function(emp, i) {
      var pill = document.createElement('button');
      pill.className = 'pill';
      pill.setAttribute('role', 'radio');
      pill.setAttribute('aria-checked', 'false');
      var role = (emp.role || 'cisnik').toLowerCase();
      pill.innerHTML =
        '<span class="pill-avatar ' + role + '">' + initialsFromName(emp.name) + '</span>' +
        '<span>' + firstName(emp.name) + '</span>';
      pill.addEventListener('click', function() {
        if (locked) return;
        if (selectedIndex === i) {
          selectedIndex = -1;
          pill.classList.remove('selected');
          pill.setAttribute('aria-checked', 'false');
        } else {
          selectedIndex = i;
          pillsEl.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('selected'); p.setAttribute('aria-checked', 'false'); });
          pill.classList.add('selected');
          pill.setAttribute('aria-checked', 'true');
        }
      });
      pillsEl.appendChild(pill);
    });
  }

  function loadStaff() {
    var ctl = null;
    try { ctl = new AbortController(); } catch (e) {}
    var timeoutId = setTimeout(function() { if (ctl) ctl.abort(); }, 4000);
    fetch('/api/auth/staff-list', ctl ? { signal: ctl.signal } : undefined)
      .then(function(r) { return r.ok ? r.json() : []; })
      .then(function(rows) {
        clearTimeout(timeoutId);
        STAFF = Array.isArray(rows) ? rows : [];
        renderPills();
      })
      .catch(function() {
        clearTimeout(timeoutId);
        STAFF = [];
        renderPills();
      });
  }

  loadStaff();

  // Keyboard handler
  document.addEventListener('keydown', function(e) {
    if (locked) return;
    if (e.key >= '0' && e.key <= '9') {
      e.preventDefault();
      if (pin.length >= 4) return;
      pin += e.key;
      updateDots();
      // Visual feedback on matching numpad button
      var btn = document.querySelector('.num-btn[data-val="' + e.key + '"]');
      if (btn) { btn.classList.add('active-flash'); setTimeout(function(){ btn.classList.remove('active-flash'); }, 150); }
      if (pin.length === 4) setTimeout(verifyPin, 150);
    } else if (e.key === 'Backspace') {
      e.preventDefault();
      if (pin.length > 0) { pin = pin.slice(0, -1); updateDots(); }
    } else if (e.key === 'Escape' || e.key === 'Delete') {
      e.preventDefault();
      clearPin();
    }
  });

  // Numpad handler
  numpad.addEventListener('click', function(e) {
    var btn = e.target.closest('.num-btn');
    if (!btn || locked) return;
    var val = btn.dataset.val;

    if (val === 'clear') {
      clearPin();
      return;
    }
    if (val === 'back') {
      if (pin.length > 0) {
        pin = pin.slice(0, -1);
        updateDots();
      }
      return;
    }

    if (pin.length >= 4) return;
    pin += val;
    updateDots();

    if (pin.length === 4) {
      setTimeout(verifyPin, 150);
    }
  });

  function updateDots() {
    dots.forEach(function(d, i) {
      d.className = 'dot' + (i < pin.length ? ' filled' : '');
    });
    dotsEl.setAttribute('aria-label', 'PIN kod - ' + pin.length + ' zo 4 cifier zadanych');
  }

  function clearPin() {
    pin = '';
    updateDots();
    clearStatus();
  }

  function clearStatus() {
    statusEl.textContent = '';
    statusEl.className = 'status';
  }

  function verifyPin() {
    setNumpadDisabled(true);
    statusEl.textContent = 'Prihlasujem…';
    statusEl.className = 'status pending';
    api.login(pin).then(function(data) {
      onSuccess(data.user);
    }).catch(function(err) {
      setNumpadDisabled(false);
      onFail(err.message);
    });
  }

  function onSuccess(user) {
    dots.forEach(function(d) {
      d.className = 'dot success';
    });
    statusEl.textContent = 'Vitajte, ' + user.name + '!';
    statusEl.className = 'status success';
    setNumpadDisabled(true);

    setTimeout(function() {
      if (posFullscreen.isActive()) {
        localStorage.setItem('pos_fs_restore', '1');
      }
      // Honour ?redirect=<path> so deep links work (e.g. mobile admin
      // shortcut opens login.html?redirect=/admin/ in a fresh tab —
      // after login we land directly on admin, not on pos-enterprise).
      // Restrict to same-origin paths to defeat open-redirect XSS:
      // only paths starting with a single slash and not '//' are kept.
      var params = new URLSearchParams(window.location.search);
      var target = params.get('redirect') || '';
      var safe = /^\/[^\/]/.test(target) ? target : null;
      window.location.href = safe || 'pos-enterprise.html';
    }, 800);
  }

  function onFail(message) {
    attempts++;
    dots.forEach(function(d) { d.className = 'dot error'; });
    dotsEl.classList.add('shake');
    statusEl.textContent = message || 'Nespravny PIN';
    statusEl.className = 'status error';

    setTimeout(function() {
      dotsEl.classList.remove('shake');
      pin = '';
      updateDots();
    }, 600);

    setTimeout(function() {
      if (!locked) {
        statusEl.textContent = '';
        statusEl.className = 'status';
      }
    }, 2000);

    if (attempts >= MAX_ATTEMPTS) {
      startLockout();
    }
  }

  function startLockout() {
    locked = true;
    setNumpadDisabled(true);
    var remaining = LOCKOUT_SEC;

    function tick() {
      statusEl.textContent = 'Prihlasenie zablokovane na ' + remaining + ' sekund';
      statusEl.className = 'status locked';
      if (remaining <= 0) {
        locked = false;
        attempts = 0;
        setNumpadDisabled(false);
        clearPin();
        clearStatus();
        return;
      }
      remaining--;
      lockTimer = setTimeout(tick, 1000);
    }
    tick();
  }

  function setNumpadDisabled(state) {
    numpad.querySelectorAll('.num-btn').forEach(function(b) {
      b.disabled = state;
    });
  }

  // Clock
  var DAYS = ['Nedela', 'Pondelok', 'Utorok', 'Streda', 'Stvrtok', 'Piatok', 'Sobota'];
  var MONTHS = ['jan', 'feb', 'mar', 'apr', 'maj', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];

  function updateClock() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2, '0');
    var m = String(now.getMinutes()).padStart(2, '0');
    clockEl.textContent = h + ':' + m;

    var day = DAYS[now.getDay()];
    var d = now.getDate();
    var mon = MONTHS[now.getMonth()];
    var y = now.getFullYear();
    clockDateEl.textContent = day + ', ' + d + '. ' + mon + ' ' + y;
  }
  updateClock();
  setInterval(updateClock, 1000);
})();
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}</script>
</body>
