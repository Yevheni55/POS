services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos
      POSTGRES_DB: pos
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos -d pos"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3080:3080"
      - "3443:3443"
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql://pos:pos@db:5432/pos
      PORT: "3080"
      # Where the daily 04:00 pg_dump writes. Lives on a named volume so
      # backups survive container rebuilds; see ./server/lib/backup.js.
      BACKUP_DIR: /backups
      # Portos na tom istom PC ako Docker: nechaj predvolené. Ak Portos beží na INOM PC, vytvor .env vedľa tohto súboru:
      #   PORTOS_BASE_URL=http://IP_TOHO_PC:3010
      # Premenná sa berie pri `docker compose up` z koreňového .env alebo z prostredia; server/.env ju pre tento kľúč v kontajneri prepíše compose.
      PORTOS_BASE_URL: ${PORTOS_BASE_URL:-http://host.docker.internal:3010}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Daily pg_dump output. Mount into the container at the path
      # BACKUP_DIR points to. Named volume keeps the files outside the
      # image and across `compose down/up` cycles; on the host they live
      # under /var/lib/docker/volumes/ (inspect with `docker volume inspect pos_backups`).
      - pos_backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
  pos_backups:
