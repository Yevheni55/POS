services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos
      POSTGRES_DB: pos
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos -d pos"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3080:3080"
      - "3443:3443"
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql://pos:pos@db:5432/pos
      PORT: "3080"
      # Portos beží na hostiteľovi (3010), nie v kontajneri — localhost by smeroval do app kontajnera
      PORTOS_BASE_URL: http://host.docker.internal:3010
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
