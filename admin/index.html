<!-- Logout Modal -->
<div class="u-overlay" id="logoutModal" role="dialog" aria-modal="true" aria-labelledby="logoutModalTitle">
  <div class="u-modal">
    <span class="u-modal-icon" aria-hidden="true">&#x1F6AA;</span>
    <div class="u-modal-title" id="logoutModalTitle">Odhlásenie</div>
    <div class="u-modal-text">Naozaj sa chcete odhlásiť?</div>
    <div class="u-modal-btns">
      <button type="button" class="u-btn u-btn-ghost" id="logoutModalCancel" onclick="closeLogoutModal()">Zrušiť</button>
      <button type="button" class="u-btn u-btn-rose" id="logoutModalConfirm" onclick="confirmLogout()">Odhlásiť</button>
    </div>
  </div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/components/loading.js"></script>
<script src="/components/validate.js"></script>
<script src="/api.js"></script>
<script>
var ROLE_LABELS={admin:'Admin',manazer:'Manažér',cisnik:'Čašník'};

// Auth check
(function(){
  if(!api.requireAuth()) return;
  var u=api.getUser();
  if(u&&u.name){
    var initials=u.name.split(' ').map(function(w){return w[0]}).join('');
    document.getElementById('userAvatar').textContent=initials;
    document.getElementById('userName').textContent=u.name;
  }
  var badge=document.getElementById('roleBadge');
  if(badge){
    var r=u&&u.role;
    if(r&&ROLE_LABELS[r]){badge.textContent=ROLE_LABELS[r];badge.style.display='';}
    else if(r){badge.textContent=r;badge.style.display='';}
    else{badge.textContent='';badge.style.display='none';}
  }
})();

// Clock
function updateClock(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('sk-SK',{hour:'2-digit',minute:'2-digit'});
}
updateClock();setInterval(updateClock,1000);

// Logout modal — focus + Escape
var logoutModalEl=document.getElementById('logoutModal');
var focusBeforeLogout=null;
function onLogoutModalKeydown(e){
  if(e.key==='Escape'){e.preventDefault();closeLogoutModal();}
}
function showLogoutModal(){
  focusBeforeLogout=document.activeElement;
  logoutModalEl.classList.add('show');
  document.addEventListener('keydown',onLogoutModalKeydown);
  var b=document.getElementById('logoutModalCancel');
  if(b)setTimeout(function(){b.focus();},10);
}
function closeLogoutModal(){
  logoutModalEl.classList.remove('show');
  document.removeEventListener('keydown',onLogoutModalKeydown);
  if(focusBeforeLogout&&typeof focusBeforeLogout.focus==='function')try{focusBeforeLogout.focus();}catch(x){}
}
function confirmLogout(){api.logout()}
logoutModalEl.addEventListener('click',function(e){if(e.target===this)closeLogoutModal()});

// Toast — supports both showToast(msg, true) and showToast(msg, 'success')
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  var cls='toast show';
  if(type===true||type==='success')cls+=' success';
  t.className=cls;
  setTimeout(function(){t.className='toast'},type==='error'?4000:2500);
}

function goBackToPOS(e){
  if(e)e.preventDefault();
  if(window.parent!==window){
    window.parent.postMessage('closePosAdmin','*');
  } else {
    window.location.href='/pos-enterprise.html';
  }
}
document.getElementById('backToPOS').addEventListener('click',goBackToPOS);
document.getElementById('headerBackToPOS').addEventListener('click',goBackToPOS);

function escapeHtml(str){
  if(str==null)return'';
  var d=document.createElement('div');
  d.textContent=String(str);
  return d.innerHTML;
}

// Dynamic confirm modal — focus + Escape + safe text
function showConfirm(title,text,onConfirm,opts){
  opts=opts||{};
  var type=opts.type||'info';
  var icon=opts.icon||(type==='danger'?'\u26A0\uFE0F':'\u2139\uFE0F');
  var btnClass=type==='danger'?'u-btn-rose':'u-btn-mint';
  var existing=document.getElementById('dynModal');
  if(existing)existing.remove();
  var prevFocus=document.activeElement;
  var ov=document.createElement('div');
  ov.className='u-overlay show';ov.id='dynModal';
  ov.setAttribute('role','dialog');
  ov.setAttribute('aria-modal','true');
  var ctext=opts.confirmText?escapeHtml(opts.confirmText):'Potvrdiť';
  ov.innerHTML='<div class="u-modal"><span class="u-modal-icon" aria-hidden="true">'+icon+'</span><div class="u-modal-title">'+escapeHtml(title)+'</div><div class="u-modal-text">'+escapeHtml(text)+'</div><div class="u-modal-btns"><button type="button" class="u-btn u-btn-ghost" id="dynCancel">Zrušiť</button><button type="button" class="u-btn '+btnClass+'" id="dynConfirm">'+ctext+'</button></div></div>';
  function cleanupDyn(){
    document.removeEventListener('keydown',onDynKey);
    if(prevFocus&&typeof prevFocus.focus==='function')try{prevFocus.focus();}catch(x){}
  }
  function removeDyn(){
    if(ov.parentNode)ov.remove();
    cleanupDyn();
  }
  function onDynKey(e){
    if(e.key==='Escape'){e.preventDefault();removeDyn();}
  }
  document.body.appendChild(ov);
  document.addEventListener('keydown',onDynKey);
  ov.querySelector('#dynCancel').onclick=function(){removeDyn();};
  ov.querySelector('#dynConfirm').onclick=function(){removeDyn();onConfirm();};
  ov.addEventListener('click',function(e){if(e.target===ov)removeDyn();});
  setTimeout(function(){var x=ov.querySelector('#dynCancel');if(x)x.focus();},0);
}
</script>
